<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Game: Space Shooter | AI Junior</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background: #000;
            border: 4px solid #1e293b;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            max-width: 95vw;
            max-height: 80vh;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            color: #8b5cf6;
        }
        .controls {
            margin-top: 20px;
            color: #64748b;
            font-size: 14px;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #ef4444;
            display: none;
            backdrop-filter: blur(10px);
        }
        #game-over h1 { color: #ef4444; margin-top: 0; }
        .btn {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { background: #7c3aed; }
        
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            text-decoration: none;
            color: #64748b;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 16px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.5);
        }
    </style>
</head>
<body>

    <a href="javascript:window.close()" class="back-btn">Tutup Game</a>

    <div class="ui">
        <div class="score">SKOR: <span id="score-val">0</span></div>
    </div>

    <canvas id="gameCanvas" width="600" height="800"></canvas>

    <div class="controls">
        Gunakan <b>Arrow Kiri/Kanan</b> untuk gerak, <b>Space</b> untuk tembak!
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Skor Akhir Anda: <span id="final-score">0</span></p>
        <button class="btn" onclick="resetGame()">Main Lagi</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = id => document.getElementById(id);

        let score = 0;
        let gameOver = false;

        // Player object
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 80,
            w: 50,
            h: 50,
            speed: 7,
            dx: 0
        };

        let bullets = [];
        let enemies = [];
        let enemyTimer = 0;
        let enemySpeed = 2;

        function drawPlayer() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#6366f1';
            ctx.font = '50px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🪰', player.x + player.w / 2, player.y + player.h / 2);
        }

        function drawBullets() {
            ctx.fillStyle = '#fbbf24';
            bullets.forEach((b, index) => {
                ctx.fillRect(b.x, b.y, b.w, b.h);
                b.y -= 10;
                
                // Remove out of bounds
                if (b.y < 0) bullets.splice(index, 1);
            });
        }

        function drawEnemies() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ef4444';
            ctx.font = '40px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            enemies.forEach((e, index) => {
                ctx.fillText('🩻', e.x + e.w / 2, e.y + e.h / 2);
                e.y += enemySpeed;

                // Collision with player
                if (e.y + e.h > player.y && e.x < player.x + player.w && e.x + e.w > player.x) {
                    endGame();
                }

                // Remove out of bounds
                if (e.y > canvas.height) enemies.splice(index, 1);
            });
        }

        function spawnEnemy() {
            enemyTimer++;
            if (enemyTimer > 60) {
                const w = 40;
                const x = Math.random() * (canvas.width - w);
                enemies.push({ x, y: -w, w, h: w });
                enemyTimer = 0;
                
                // Increase difficulty
                if (score > 0 && score % 100 === 0) enemySpeed += 0.1;
            }
        }

        function checkCollisions() {
            bullets.forEach((b, bi) => {
                enemies.forEach((e, ei) => {
                    if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        bullets.splice(bi, 1);
                        enemies.splice(ei, 1);
                        score += 10;
                        scoreEl('score-val').innerText = score;
                    }
                });
            });
        }

        function clear() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function update() {
            if (gameOver) return;

            clear();
            drawPlayer();
            drawBullets();
            drawEnemies();
            spawnEnemy();
            checkCollisions();

            // Player movement
            if (player.x + player.dx > 0 && player.x + player.dx + player.w < canvas.width) {
                player.x += player.dx;
            }

            requestAnimationFrame(update);
        }

        function endGame() {
            gameOver = true;
            scoreEl('game-over').style.display = 'block';
            scoreEl('final-score').innerText = score;
        }

        function resetGame() {
            score = 0;
            scoreEl('score-val').innerText = '0';
            gameOver = false;
            bullets = [];
            enemies = [];
            enemySpeed = 2;
            player.x = canvas.width / 2 - 25;
            scoreEl('game-over').style.display = 'none';
            update();
        }

        // Key listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') player.dx = -player.speed;
            if (e.key === 'ArrowRight') player.dx = player.speed;
            if (e.key === ' ' || e.key === 'Spacebar') {
                bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') player.dx = 0;
        });

        // Start game
        update();

    </script>
</body>
</html>
